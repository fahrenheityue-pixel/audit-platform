<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>工单详情 · 主播主动申请-机审</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e7eaf0;
      --text: #1f2d3d;
      --sub: #667085;
      --blue: #2f54eb;
      --green: #12b76a;
      --orange: #f79009;
      --gray: #98a2b3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 88px;
    }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .crumb {
      font-size: 13px;
      color: var(--sub);
    }

    .crumb a {
      color: var(--blue);
      text-decoration: none;
    }

    .crumb a:hover {
      text-decoration: underline;
    }

    .crumb strong {
      color: var(--text);
      font-weight: 600;
    }

    .wrap {
      width: 96%;
      max-width: 1040px;
      margin: 20px auto;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(16, 24, 40, 0.04);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f1f3f7;
    }

    .grid-basic {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 14px 28px;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-row label {
      font-size: 12px;
      color: var(--sub);
    }

    .field-row .value {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      line-height: 22px;
      border-radius: 11px;
      padding: 0 9px;
      color: #fff;
      font-size: 12px;
    }

    .b-gray { background: var(--gray); }
    .b-green { background: var(--green); }
    .b-orange { background: var(--orange); }

    .reason-box {
      font-size: 14px;
      line-height: 1.7;
      color: #344054;
      white-space: pre-wrap;
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px solid #eaecf0;
    }

    .audit-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .audit-block .field-row label {
      font-weight: 600;
      color: #344054;
      font-size: 13px;
    }

    .audit-block .field-row .hint {
      font-size: 12px;
      color: var(--sub);
      font-weight: 400;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .radio-group label {
      font-weight: 400;
      cursor: pointer;
      font-size: 14px;
      color: #344054;
    }

    .audit-block textarea {
      width: 100%;
      min-height: 88px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d0d5dd;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }

    .audit-block textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 84, 235, 0.12);
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .footer-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 -4px 12px rgba(16, 24, 40, 0.06);
      z-index: 50;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 18px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.25;
      cursor: pointer;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #344054;
    }

    .btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-default {
      background: #fff;
      border: 1px solid #d0d5dd;
      color: #344054;
    }

    .empty-tip {
      padding: 32px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-tip a {
      color: var(--blue);
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-dialog {
      background: var(--card);
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--line);
      box-shadow: 0 16px 48px rgba(16, 24, 40, 0.18);
    }

    .modal-head {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid #f1f3f7;
    }

    .modal-body {
      padding: 16px 20px;
      font-size: 14px;
      color: #344054;
      line-height: 1.6;
    }

    .modal-summary {
      margin-top: 12px;
      padding: 12px 14px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #eaecf0;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .modal-summary--admin-result {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      background: #f2f4f7;
      border-color: #d0d5dd;
    }

    .modal-foot {
      padding: 12px 20px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 720px) {
      .grid-basic {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="crumb">
      <a href="audit-list-prototype.html">审核列表</a>
      <span> / </span>
      <strong>工单详情</strong>
    </div>
  </div>

  <div class="wrap" id="mainWrap"></div>

  <div class="footer-bar">
    <div class="footer-actions">
      <button type="button" class="btn btn-primary" id="btnAdminEdit" style="display:none">修改审核结果</button>
      <button type="button" class="btn btn-default" id="btnAdminCancel" style="display:none">取消</button>
      <button type="button" class="btn btn-primary" id="btnAdminSave" style="display:none">提交修改</button>
      <button type="button" class="btn" id="btnBack">返回审核列表</button>
    </div>
  </div>

  <div id="adminUnchangedModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="adminUnchangedTitle">
    <div class="modal-dialog" id="adminUnchangedModalBox">
      <div class="modal-head" id="adminUnchangedTitle">提示</div>
      <div class="modal-body">
        <p style="margin:0">结果未更改，无需提交</p>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-primary" id="adminUnchangedOk">知道了</button>
      </div>
    </div>
  </div>

  <div id="adminSaveModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="adminSaveModalTitle">
    <div class="modal-dialog" id="adminSaveModalBox">
      <div class="modal-head" id="adminSaveModalTitle">确认提交</div>
      <div class="modal-body">
        <p id="adminSaveModalIntro" style="margin:0"></p>
        <div id="adminSaveModalResult" class="modal-summary modal-summary--admin-result" style="display:none"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn" id="adminSaveModalCancel">返回修改</button>
        <button type="button" class="btn btn-primary" id="adminSaveModalConfirm">确认保存</button>
      </div>
    </div>
  </div>

  <script>
    const detailAnchorApplyMachine = {
      JS20260409001: {
        channel: "主播主动申请",
        channelId: "1001",
        auditMethod: "机审",
        ticketId: "JS20260409001",
        createTime: "2026-04-08 16:00:00",
        albumId: "A90001",
        albumName: "财经热点早知道",
        lastSoundId: "SND100096",
        lastSoundTitle: "第 100 章｜本单元小结",
        authorFinished: "是",
        auditResult: "完结",
        auditReason:
          "机审识别到专辑已打「完结」标签，且近 30 天无新增声音，符合完结口径。",
        auditTime: "2026-04-09 09:31:00"
      },
      JS20260409002: {
        channel: "主播主动申请",
        channelId: "1001",
        auditMethod: "机审",
        ticketId: "JS20260409002",
        createTime: "2026-04-08 17:20:00",
        albumId: "A90002",
        albumName: "创业案例拆解",
        lastSoundId: "SND100048",
        lastSoundTitle: "第 48 章｜复盘与展望",
        authorFinished: "否",
        auditResult: "完结",
        auditReason:
          "机审依据专辑元数据与更新节奏判断可进入后续人审环节（原型示例文案）。",
        auditTime: "2026-04-09 09:48:00"
      }
    };

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/"/g, "&quot;");
    }

    function getQueryTicketId() {
      const p = new URLSearchParams(window.location.search);
      return (p.get("ticketId") || "").trim();
    }

    const AUDIT_PATCH_KEY = "auditResultPatches";
    const ADMIN_EDIT_BASELINE_KEY = "auditAdminEditBaseline";
    const ADMIN_SESSION_KEY = "auditListAdmin";

    function readAdminBaselineMap() {
      try {
        return JSON.parse(sessionStorage.getItem(ADMIN_EDIT_BASELINE_KEY) || "{}");
      } catch (e) {
        return {};
      }
    }

    function getAdminResultBaseline(ticketId) {
      const m = readAdminBaselineMap();
      const b = m[ticketId];
      return b && b.result != null ? String(b.result) : null;
    }

    function setAdminResultBaseline(ticketId, result) {
      const m = readAdminBaselineMap();
      m[ticketId] = { result: String(result || "") };
      sessionStorage.setItem(ADMIN_EDIT_BASELINE_KEY, JSON.stringify(m));
    }

    function clearAdminResultBaseline(ticketId) {
      const m = readAdminBaselineMap();
      delete m[ticketId];
      sessionStorage.setItem(ADMIN_EDIT_BASELINE_KEY, JSON.stringify(m));
    }

    function isAuditListAdmin() {
      try {
        return sessionStorage.getItem(ADMIN_SESSION_KEY) === "1";
      } catch (e) {
        return false;
      }
    }

    function getAuditPatch(ticketId) {
      try {
        const m = JSON.parse(sessionStorage.getItem(AUDIT_PATCH_KEY) || "{}");
        return m[ticketId] || null;
      } catch (e) {
        return null;
      }
    }

    function getTicketContext(ticketId) {
      try {
        const raw = sessionStorage.getItem("ticketContext_" + ticketId);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function canAdminEditFromListContext(ctx) {
      return (
        ctx &&
        ctx.status === "已审核" &&
        ctx.flow === "否" &&
        ctx.method === "人审"
      );
    }

    function syncAdminSessionFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        if (p.get("admin") === "1") {
          sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
        }
      } catch (e) {}
    }

    function shouldShowAdminEditButton(ticketId) {
      if (!isAuditListAdmin()) return false;
      return canAdminEditFromListContext(getTicketContext(ticketId));
    }

    function isTicketDetailAdminEditMode() {
      return new URLSearchParams(window.location.search).get("adminEdit") === "1";
    }

    function formatNowAuditTime() {
      const n = new Date();
      const p = x => String(x).padStart(2, "0");
      return `${n.getFullYear()}-${p(n.getMonth() + 1)}-${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    }

    function persistAuditPatch(ticketId, result, remark, adminChange) {
      let m = {};
      try {
        m = JSON.parse(sessionStorage.getItem(AUDIT_PATCH_KEY) || "{}");
      } catch (e) {
        m = {};
      }
      const prev = m[ticketId] || {};
      const log = Array.isArray(prev.adminChangeLog) ? prev.adminChangeLog.slice() : [];
      if (adminChange && adminChange.fromResult !== adminChange.toResult) {
        log.push({
          time: formatNowAuditTime(),
          fromResult: adminChange.fromResult,
          toResult: adminChange.toResult
        });
      }
      m[ticketId] = {
        ...prev,
        result,
        remark,
        time: formatNowAuditTime(),
        adminChangeLog: log
      };
      sessionStorage.setItem(AUDIT_PATCH_KEY, JSON.stringify(m));
    }

    function renderAdminChangeLogBlock(patch) {
      const log = patch && Array.isArray(patch.adminChangeLog) ? patch.adminChangeLog : [];
      if (!log.length) return "";
      const lines = log.map(
        e =>
          `${escapeHtml(e.time)} 将「${escapeHtml(e.fromResult)}」改为「${escapeHtml(e.toResult)}」`
      );
      return `<div class="field-row">
        <label>管理员修改记录</label>
        <div class="reason-box">${lines.join("<br/>")}</div>
      </div>`;
    }

    function setTicketDetailAdminEditParam(on) {
      const u = new URL(window.location.href);
      if (on) u.searchParams.set("adminEdit", "1");
      else u.searchParams.delete("adminEdit");
      history.replaceState(null, "", u.toString());
    }

    function updateTicketDetailFooter(showAdmin) {
      const edit = showAdmin && isTicketDetailAdminEditMode();
      const btnEdit = document.getElementById("btnAdminEdit");
      const btnCancel = document.getElementById("btnAdminCancel");
      const btnSave = document.getElementById("btnAdminSave");
      const btnBack = document.getElementById("btnBack");
      if (!showAdmin) {
        if (btnEdit) btnEdit.style.display = "none";
        if (btnCancel) btnCancel.style.display = "none";
        if (btnSave) btnSave.style.display = "none";
        if (btnBack) btnBack.style.display = "inline-block";
        return;
      }
      if (edit) {
        if (btnEdit) btnEdit.style.display = "none";
        if (btnCancel) btnCancel.style.display = "inline-block";
        if (btnSave) btnSave.style.display = "inline-block";
        if (btnBack) btnBack.style.display = "inline-block";
      } else {
        if (btnEdit) btnEdit.style.display = "inline-block";
        if (btnCancel) btnCancel.style.display = "none";
        if (btnSave) btnSave.style.display = "none";
        if (btnBack) btnBack.style.display = "inline-block";
      }
    }

    function renderDetail(d, ticketId) {
      const patch = getAuditPatch(ticketId);
      let auditResult = d.auditResult;
      let auditReason = d.auditReason;
      let auditTime = d.auditTime;
      if (patch) {
        if (patch.result) auditResult = patch.result;
        if (patch.time) auditTime = patch.time;
      }
      const authorYes = d.authorFinished === "是";
      const resultClass = auditResult === "完结" ? "b-green" : "b-orange";
      const adminEdit = isTicketDetailAdminEditMode() && shouldShowAdminEditButton(ticketId);

      let auditSectionHtml;
      if (adminEdit) {
        auditSectionHtml = `
          <div class="audit-block">
            <div class="field-row">
              <label>审核结果 <span class="hint">（必选）</span></label>
              <div class="radio-group">
                <label><input type="radio" name="tdAdminResult" value="完结" ${auditResult === "完结" ? "checked" : ""} /> 完结</label>
                <label><input type="radio" name="tdAdminResult" value="未完结" ${auditResult === "未完结" ? "checked" : ""} /> 未完结</label>
              </div>
            </div>
            <div class="field-row">
              <label>原因</label>
              <div class="reason-box">${escapeHtml(auditReason)}</div>
            </div>
            <div class="field-row">
              <label>审核时间</label>
              <div class="value">${escapeHtml(auditTime || "—")}</div>
            </div>
            ${renderAdminChangeLogBlock(patch)}
          </div>`;
      } else {
        auditSectionHtml = `
          <div class="audit-block">
            <div class="field-row">
              <label>审核结果</label>
              <div class="value"><span class="badge ${resultClass}">${escapeHtml(auditResult)}</span></div>
            </div>
            <div class="field-row">
              <label>原因</label>
              <div class="reason-box">${escapeHtml(auditReason)}</div>
            </div>
            <div class="field-row">
              <label>审核时间</label>
              <div class="value">${escapeHtml(auditTime || "—")}</div>
            </div>
            ${renderAdminChangeLogBlock(patch)}
          </div>`;
      }

      document.getElementById("mainWrap").innerHTML = `
        <div class="section">
          <h2 class="section-title">基础信息</h2>
          <div class="grid-basic">
            <div class="field-row"><label>渠道ID</label><div class="value">${escapeHtml(d.channelId)}</div></div>
            <div class="field-row"><label>渠道</label><div class="value">${escapeHtml(d.channel)}</div></div>
            <div class="field-row"><label>审核方式</label><div class="value">${escapeHtml(d.auditMethod)}</div></div>
            <div class="field-row"><label>工单ID</label><div class="value">${escapeHtml(d.ticketId)}</div></div>
            <div class="field-row"><label>创建时间</label><div class="value">${escapeHtml(d.createTime || "—")}</div></div>
            <div class="field-row"><label>专辑ID</label><div class="value">${escapeHtml(d.albumId)}</div></div>
            <div class="field-row" style="grid-column:1/-1"><label>专辑名称</label><div class="value">${escapeHtml(d.albumName)}</div></div>
            <div class="field-row"><label>最后1章声音ID</label><div class="value">${escapeHtml(d.lastSoundId)}</div></div>
            <div class="field-row"><label>最后1章声音标题</label><div class="value">${escapeHtml(d.lastSoundTitle)}</div></div>
            <div class="field-row"><label>作者是否完结</label><div class="value"><span class="badge ${authorYes ? "b-green" : "b-gray"}">${escapeHtml(d.authorFinished)}</span></div></div>
          </div>
        </div>
        <div class="section">
          <h2 class="section-title">审核信息</h2>
          ${auditSectionHtml}
        </div>
      `;

      const showAdmin = shouldShowAdminEditButton(ticketId);
      if (adminEdit && showAdmin && getAdminResultBaseline(ticketId) == null) {
        setAdminResultBaseline(ticketId, auditResult);
      }
      updateTicketDetailFooter(showAdmin);
    }

    function renderUnsupported(ticketId) {
      document.getElementById("mainWrap").innerHTML = `
        <div class="section empty-tip">
          <p>当前原型仅支持查看 <strong>主播主动申请 · 机审</strong> 类工单详情。</p>
          <p>工单 <code style="background:#f2f4f7;padding:2px 6px;border-radius:4px">${escapeHtml(ticketId)}</code> 的详情模板尚未接入。</p>
          <p style="margin-top:16px"><a href="audit-list-prototype.html">返回审核列表</a></p>
        </div>
      `;
    }

    (function init() {
      syncAdminSessionFromUrl();
      const ticketId = getQueryTicketId();
      document.getElementById("btnBack").addEventListener("click", () => {
        window.location.href = isAuditListAdmin()
          ? "audit-list-prototype.html?admin=1"
          : "audit-list-prototype.html";
      });

      const btnAdminEdit = document.getElementById("btnAdminEdit");
      if (btnAdminEdit) {
        btnAdminEdit.addEventListener("click", () => {
          const tid = getQueryTicketId();
          if (!shouldShowAdminEditButton(tid)) return;
          setTicketDetailAdminEditParam(true);
          const d = detailAnchorApplyMachine[tid];
          if (d) renderDetail(d, tid);
        });
      }

      const btnAdminCancel = document.getElementById("btnAdminCancel");
      if (btnAdminCancel) {
        btnAdminCancel.addEventListener("click", () => {
          const tid = getQueryTicketId();
          clearAdminResultBaseline(tid);
          setTicketDetailAdminEditParam(false);
          const d = detailAnchorApplyMachine[tid];
          if (d) renderDetail(d, tid);
        });
      }

      const adminSaveModal = document.getElementById("adminSaveModal");
      const adminSaveModalBox = document.getElementById("adminSaveModalBox");
      function closeAdminSaveModal() {
        window.__tdAdminSavePending = null;
        if (adminSaveModal) adminSaveModal.classList.remove("show");
        const resEl = document.getElementById("adminSaveModalResult");
        if (resEl) {
          resEl.style.display = "none";
          resEl.textContent = "";
        }
      }
      if (adminSaveModalBox) {
        adminSaveModalBox.addEventListener("click", e => e.stopPropagation());
      }
      if (adminSaveModal) {
        adminSaveModal.addEventListener("click", e => {
          if (e.target === adminSaveModal) closeAdminSaveModal();
        });
      }
      document.getElementById("adminSaveModalCancel")?.addEventListener("click", closeAdminSaveModal);
      document.getElementById("adminSaveModalConfirm")?.addEventListener("click", () => {
        closeAdminSaveModal();
        const tid = getQueryTicketId();
        const pending = window.__tdAdminSavePending;
        window.__tdAdminSavePending = null;
        if (!pending || pending.ticketId !== tid) return;
        persistAuditPatch(tid, pending.result, pending.remark, pending.adminChange);
        clearAdminResultBaseline(tid);
        setTicketDetailAdminEditParam(false);
        const d = detailAnchorApplyMachine[tid];
        if (d) renderDetail(d, tid);
      });

      const adminUnchangedModal = document.getElementById("adminUnchangedModal");
      function closeAdminUnchangedModal() {
        if (adminUnchangedModal) adminUnchangedModal.classList.remove("show");
      }
      document.getElementById("adminUnchangedModalBox")?.addEventListener("click", e => e.stopPropagation());
      adminUnchangedModal?.addEventListener("click", e => {
        if (e.target === adminUnchangedModal) closeAdminUnchangedModal();
      });
      document.getElementById("adminUnchangedOk")?.addEventListener("click", closeAdminUnchangedModal);

      document.getElementById("btnAdminSave")?.addEventListener("click", () => {
        const tid = getQueryTicketId();
        const c = document.querySelector('input[name="tdAdminResult"]:checked');
        const result = c ? c.value : "";
        if (!result) {
          alert("请选择审核结果（完结 / 未完结）");
          return;
        }
        const remark = "";
        let baseline = getAdminResultBaseline(tid);
        if (baseline == null) {
          const d0 = detailAnchorApplyMachine[tid];
          const p0 = getAuditPatch(tid);
          baseline = p0 && p0.result ? p0.result : d0 ? d0.auditResult : "";
          setAdminResultBaseline(tid, baseline);
        }
        if (result === baseline) {
          if (adminUnchangedModal) adminUnchangedModal.classList.add("show");
          return;
        }
        const intro = document.getElementById("adminSaveModalIntro");
        const resEl = document.getElementById("adminSaveModalResult");
        if (intro) {
          intro.textContent =
            "确定要保存以下审核结果吗？保存后将更新列表与该工单的展示信息。";
        }
        if (resEl) {
          resEl.textContent = "审核结果：" + result;
          resEl.style.display = "block";
        }
        window.__tdAdminSavePending = {
          ticketId: tid,
          result,
          remark,
          adminChange: { fromResult: baseline, toResult: result }
        };
        if (adminSaveModal) adminSaveModal.classList.add("show");
      });

      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && adminSaveModal && adminSaveModal.classList.contains("show")) {
          closeAdminSaveModal();
        }
        if (e.key === "Escape" && adminUnchangedModal && adminUnchangedModal.classList.contains("show")) {
          closeAdminUnchangedModal();
        }
      });

      if (!ticketId) {
        document.getElementById("mainWrap").innerHTML =
          '<div class="section empty-tip">缺少工单参数。<a href="audit-list-prototype.html">返回审核列表</a></div>';
        const ba = document.getElementById("btnAdminEdit");
        if (ba) ba.style.display = "none";
        return;
      }

      const d = detailAnchorApplyMachine[ticketId];
      if (!d) {
        renderUnsupported(ticketId);
        const ba = document.getElementById("btnAdminEdit");
        if (ba) ba.style.display = "none";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      if (
        params.get("ae") === "1" &&
        params.get("admin") === "1" &&
        !getTicketContext(ticketId)
      ) {
        try {
          sessionStorage.setItem(
            "ticketContext_" + ticketId,
            JSON.stringify({
              channelId: d.channelId,
              channel: d.channel,
              method: d.auditMethod,
              ticketId: d.ticketId,
              albumId: d.albumId,
              albumName: d.albumName,
              createTime: d.createTime || "",
              status: "已审核",
              result: d.auditResult,
              time: d.auditTime,
              flow: "否",
              linked: { upstream: "", downstream: "" }
            })
          );
        } catch (e) {}
      }

      renderDetail(d, ticketId);
    })();
  </script>
</body>
</html>
