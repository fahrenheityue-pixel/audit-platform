<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>申诉工单查看</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e7eaf0;
      --text: #1f2d3d;
      --sub: #667085;
      --blue: #2f54eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 88px;
    }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
    }

    .crumb {
      font-size: 13px;
      color: var(--sub);
    }

    .crumb a {
      color: var(--blue);
      text-decoration: none;
    }

    .crumb a:hover {
      text-decoration: underline;
    }

    .crumb strong {
      color: var(--text);
      font-weight: 600;
    }

    .wrap {
      width: 96%;
      max-width: 1040px;
      margin: 20px auto;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(16, 24, 40, 0.04);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f1f3f7;
    }

    .grid-basic {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 14px 28px;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-row label {
      font-size: 12px;
      color: var(--sub);
    }

    .field-row .value {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .appeal-type-box {
      font-size: 14px;
      line-height: 1.55;
      color: #344054;
      background: #f9fafb;
      border: 1px solid #eaecf0;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .appeal-reason {
      font-size: 14px;
      line-height: 1.65;
      color: #344054;
      white-space: pre-wrap;
      background: #fafbff;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px dashed #d0d5dd;
      min-height: 48px;
    }

    .appeal-reason.is-empty {
      color: var(--sub);
      font-style: normal;
    }

    .files {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .files.is-empty {
      font-size: 14px;
      color: var(--sub);
    }

    .file-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #f2f4f7;
      color: #175cd3;
      font-size: 13px;
      text-decoration: none;
      border: 1px solid #eaecf0;
    }

    .file-link:hover {
      background: #eef4ff;
    }

    .audit-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .audit-row > label {
      font-size: 13px;
      font-weight: 600;
      color: #344054;
    }

    /* 与机审工单详情 ticket-detail 审核信息区一致 */
    .audit-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .audit-block .field-row label {
      font-weight: 600;
      color: #344054;
      font-size: 13px;
    }

    .result-pill {
      display: inline-block;
      align-self: flex-start;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
    }

    .result-pill--done {
      background: #12b76a;
      color: #fff;
    }

    .result-pill--open {
      background: #f79009;
      color: #fff;
    }

    .footer-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 -4px 12px rgba(16, 24, 40, 0.06);
      z-index: 50;
    }

    .footer-bar .footer-spacer {
      flex: 1;
      min-width: 8px;
    }

    .btn {
      height: 38px;
      padding: 0 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #344054;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    @media (max-width: 720px) {
      .grid-basic {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="crumb">
      <a href="audit-list-prototype.html">审核列表</a>
      <span> / </span>
      <strong>申诉工单查看</strong>
    </div>
  </div>

  <div class="wrap" id="mainContent"></div>

  <div class="footer-bar">
    <button type="button" class="btn btn-primary" id="btnAdminEdit" style="display:none">修改审核结果</button>
    <div class="footer-spacer"></div>
    <button type="button" class="btn" id="btnBack">返回审核列表</button>
  </div>

  <script>
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/"/g, "&quot;");
    }

    /** 申诉类型（二级标签，三选一，必填） */
    const APPEAL_TYPE_OPTIONS = [
      "我的专辑还未完结-原文未更新完",
      "还需上传物料（音频）",
      "其他"
    ];

    const detailByTicket = {
      SS20260409008: {
        channelId: "1002",
        channel: "机审回扫",
        ticketId: "SS20260409008",
        createTime: "2026-04-05 12:00:00",
        albumId: "A90008",
        albumName: "电影深度解析",
        anchorLevel: "Lv.4 认证主播",
        appealType: "我的专辑还未完结-原文未更新完",
        appealReason:
          "人审结果与实际情况不符，第 8 章文稿上周已更新完毕，请复核。",
        appealFiles: [
          { name: "第8章更新截图.png", href: "#" },
          { name: "后台章节列表.pdf", href: "#" }
        ],
        auditTag: "未完结",
        auditTime: "2026-04-06 10:18:00"
      },
      SS20260409041: {
        channelId: "1002",
        channel: "机审回扫",
        ticketId: "SS20260409041",
        createTime: "2026-04-04 10:00:00",
        albumId: "A90041",
        albumName: "古典乐赏析课",
        anchorLevel: "Lv.5 优质主播",
        appealType: "还需上传物料（音频）",
        appealReason: "",
        appealFiles: [],
        auditTag: "未完结",
        auditTime: "2026-04-05 15:42:00"
      }
    };

    function getQueryTicketId() {
      const p = new URLSearchParams(window.location.search);
      return (p.get("ticketId") || "").trim();
    }

    const AUDIT_PATCH_KEY = "auditResultPatches";
    const ADMIN_SESSION_KEY = "auditListAdmin";

    function isAuditListAdmin() {
      try {
        return sessionStorage.getItem(ADMIN_SESSION_KEY) === "1";
      } catch (e) {
        return false;
      }
    }

    function getAuditPatch(ticketId) {
      try {
        const m = JSON.parse(sessionStorage.getItem(AUDIT_PATCH_KEY) || "{}");
        return m[ticketId] || null;
      } catch (e) {
        return null;
      }
    }

    function getTicketContext(ticketId) {
      try {
        const raw = sessionStorage.getItem("ticketContext_" + ticketId);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function canAdminEditFromListContext(ctx) {
      return ctx && ctx.status === "已审核" && ctx.flow === "否";
    }

    function syncAdminSessionFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search);
        if (p.get("admin") === "1") {
          sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
        }
      } catch (e) {}
    }

    function shouldShowAdminEditButton(ticketId) {
      if (!isAuditListAdmin()) return false;
      const p = new URLSearchParams(window.location.search);
      if (p.get("ae") === "1") return true;
      return canAdminEditFromListContext(getTicketContext(ticketId));
    }

    function getDetailForTicket(ticketId) {
      const direct = detailByTicket[ticketId];
      if (direct) {
        return { ...direct, ticketId };
      }
      const baseId = ticketId.replace(/P\d{2}$/, "");
      if (baseId !== ticketId) {
        const base = detailByTicket[baseId];
        if (base) {
          return { ...base, ticketId };
        }
      }
      return null;
    }

    function renderFiles(files) {
      if (!files || !files.length) {
        return '<div class="files is-empty">未上传</div>';
      }
      return `<div class="files">${files
        .map(
          f =>
            `<a class="file-link" href="${escapeHtml(f.href)}" download>${escapeHtml(f.name)}</a>`
        )
        .join("")}</div>`;
    }

    function renderDetail(ticketId) {
      const d = getDetailForTicket(ticketId);
      const main = document.getElementById("mainContent");
      if (!d) {
        main.innerHTML =
          '<div class="section"><p>未找到该申诉工单的原型数据，请从列表进入。</p><p><a href="audit-list-prototype.html">返回审核列表</a></p></div>';
        const ba = document.getElementById("btnAdminEdit");
        if (ba) ba.style.display = "none";
        return;
      }

      const typeOk = APPEAL_TYPE_OPTIONS.includes(d.appealType);
      const typeDisplay = typeOk ? d.appealType : d.appealType || "—";

      const reason = (d.appealReason || "").trim();
      const reasonHtml = reason
        ? `<div class="appeal-reason">${escapeHtml(reason)}</div>`
        : `<div class="appeal-reason is-empty">未填写</div>`;

      const patch = getAuditPatch(ticketId);
      let tag = d.auditTag || "未完结";
      if (patch && patch.result) {
        tag = patch.result;
      }
      const resultPillClass =
        tag === "完结" ? "result-pill result-pill--done" : "result-pill result-pill--open";

      let auditTime = d.auditTime;
      if (patch && patch.time) {
        auditTime = patch.time;
      }
      const auditTimeStr =
        auditTime != null && String(auditTime).trim() !== ""
          ? escapeHtml(String(auditTime).trim())
          : "—";

      const adminNoteBlock =
        patch && patch.remark && String(patch.remark).trim()
          ? `<div class="field-row">
            <label>管理员备注</label>
            <div class="appeal-reason">${escapeHtml(String(patch.remark).trim())}</div>
          </div>`
          : "";

      main.innerHTML = `
        <div class="section">
          <h2 class="section-title">基础信息</h2>
          <div class="grid-basic">
            <div class="field-row"><label>渠道ID</label><div class="value">${escapeHtml(d.channelId)}</div></div>
            <div class="field-row"><label>渠道</label><div class="value">${escapeHtml(d.channel)}</div></div>
            <div class="field-row"><label>审核方式</label><div class="value">申诉</div></div>
            <div class="field-row"><label>工单ID</label><div class="value">${escapeHtml(d.ticketId)}</div></div>
            <div class="field-row"><label>创建时间</label><div class="value">${escapeHtml(d.createTime || "—")}</div></div>
            <div class="field-row"><label>专辑ID</label><div class="value">${escapeHtml(d.albumId)}</div></div>
            <div class="field-row" style="grid-column:1/-1"><label>专辑名称</label><div class="value">${escapeHtml(d.albumName)}</div></div>
            <div class="field-row"><label>主播等级</label><div class="value">${escapeHtml(d.anchorLevel)}</div></div>
            <div class="field-row" style="grid-column:1/-1">
              <label>申诉类型</label>
              <div class="appeal-type-box">${escapeHtml(typeDisplay)}</div>
            </div>
            <div class="field-row" style="grid-column:1/-1">
              <label>申诉理由</label>
              ${reasonHtml}
            </div>
            <div class="field-row" style="grid-column:1/-1">
              <label>申诉凭证</label>
              ${renderFiles(d.appealFiles)}
            </div>
          </div>
        </div>
        <div class="section">
          <h2 class="section-title">审核信息</h2>
          <div class="audit-block">
            <div class="field-row">
              <label>审核结果</label>
              <div class="value"><span class="${resultPillClass}">${escapeHtml(tag)}</span></div>
            </div>
            ${adminNoteBlock}
            <div class="field-row">
              <label>审核时间</label>
              <div class="value">${auditTimeStr}</div>
            </div>
          </div>
        </div>`;

      const showAdmin = shouldShowAdminEditButton(ticketId);
      const btnAe = document.getElementById("btnAdminEdit");
      if (btnAe) btnAe.style.display = showAdmin ? "inline-block" : "none";
    }

    document.getElementById("btnBack").addEventListener("click", () => {
      window.location.href = isAuditListAdmin()
        ? "audit-list-prototype.html?admin=1"
        : "audit-list-prototype.html";
    });

    document.getElementById("btnAdminEdit").addEventListener("click", () => {
      const tid = getQueryTicketId();
      const raw = sessionStorage.getItem("ticketContext_" + tid);
      if (!raw) {
        alert("缺少列表上下文，请从审核列表点击「查看」进入后再试。");
        return;
      }
      sessionStorage.setItem("adminEditTicketRow", raw);
      window.location.href =
        "admin-audit-result.html?ticketId=" +
        encodeURIComponent(tid) +
        "&admin=1&_=" +
        Date.now();
    });

    (function init() {
      syncAdminSessionFromUrl();
      const ticketId = getQueryTicketId();
      if (!ticketId) {
        document.getElementById("mainContent").innerHTML =
          '<div class="section"><p>缺少工单参数。</p><a href="audit-list-prototype.html">返回审核列表</a></div>';
        const ba = document.getElementById("btnAdminEdit");
        if (ba) ba.style.display = "none";
        return;
      }

      const dPre = getDetailForTicket(ticketId);
      const ap = new URLSearchParams(window.location.search);
      if (
        dPre &&
        ap.get("ae") === "1" &&
        ap.get("admin") === "1" &&
        !getTicketContext(ticketId)
      ) {
        try {
          sessionStorage.setItem(
            "ticketContext_" + ticketId,
            JSON.stringify({
              channelId: dPre.channelId,
              channel: dPre.channel,
              method: "申诉",
              ticketId: dPre.ticketId,
              albumId: dPre.albumId,
              albumName: dPre.albumName,
              createTime: dPre.createTime || "",
              status: "已审核",
              result: dPre.auditTag === "完结" ? "完结" : "未完结",
              time: "",
              flow: "否",
              linked: { upstream: "", downstream: "" }
            })
          );
        } catch (e) {}
      }

      renderDetail(ticketId);
    })();
  </script>
</body>
</html>
