<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>管理员 · 修改审核结果</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e7eaf0;
      --text: #1f2d3d;
      --sub: #667085;
      --blue: #2f54eb;
      --green: #12b76a;
      --orange: #f79009;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 96px;
    }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
    }

    .crumb {
      font-size: 13px;
      color: var(--sub);
    }

    .crumb a {
      color: var(--blue);
      text-decoration: none;
    }

    .crumb a:hover {
      text-decoration: underline;
    }

    .crumb strong {
      color: var(--text);
      font-weight: 600;
    }

    .wrap {
      width: 96%;
      max-width: 640px;
      margin: 20px auto;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(16, 24, 40, 0.04);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f1f3f7;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field-row:last-child {
      margin-bottom: 0;
    }

    .field-row label {
      font-size: 13px;
      font-weight: 600;
      color: #344054;
    }

    .field-row .hint {
      font-size: 12px;
      color: var(--sub);
      font-weight: 400;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .radio-group label {
      font-weight: 400;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d0d5dd;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 84, 235, 0.12);
    }

    .meta-line {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }

    .meta-line code {
      background: #f2f4f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .footer-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 -4px 12px rgba(16, 24, 40, 0.06);
      z-index: 50;
    }

    .btn {
      height: 38px;
      padding: 0 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #344054;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    .empty-tip {
      padding: 24px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-tip a {
      color: var(--blue);
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-dialog {
      background: var(--card);
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--line);
      box-shadow: 0 16px 48px rgba(16, 24, 40, 0.18);
    }

    .modal-head {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid #f1f3f7;
    }

    .modal-body {
      padding: 16px 20px;
      font-size: 14px;
      color: #344054;
      line-height: 1.6;
    }

    .modal-summary {
      margin-top: 12px;
      padding: 12px 14px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #eaecf0;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .modal-foot {
      padding: 12px 20px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="crumb">
      <a href="audit-list-prototype.html">审核列表</a>
      <span> / </span>
      <strong>管理员 · 修改审核结果</strong>
    </div>
  </div>

  <div class="wrap" id="mainWrap">
    <div class="section empty-tip">
      <p style="margin:0 0 12px;font-size:15px;color:#1f2d3d">
        管理员修改审核结果已合并到<strong>各工单详情页</strong>内，不再使用本独立页面。
      </p>
      <p style="margin:0;line-height:1.7">
        请在审核列表点击「<strong>查看</strong>」进入工单详情，在左下角点击「<strong>修改审核结果</strong>」进入可编辑状态；或点击行内「<strong>改审核结果</strong>」直接进入编辑状态。提交前会二次确认，与人工审核流程一致。
      </p>
      <p style="margin-top:20px">
        <a href="audit-list-prototype.html?admin=1">返回审核列表（管理员）</a>
      </p>
    </div>
  </div>

  <script>
    (function init() {
      try {
        const p = new URLSearchParams(window.location.search);
        if (p.get("admin") === "1") {
          sessionStorage.setItem("auditListAdmin", "1");
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
